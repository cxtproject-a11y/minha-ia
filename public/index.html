<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minha IA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 12px;
      border-radius: 12px;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .bot {
      align-self: flex-start;
      background: #1e293b;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Digite sua mensagem..." />
  <button onclick="enviar()">Enviar</button>
</div>

<script src="script.js"></script>
</body>
</html>
