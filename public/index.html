<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minha IA</title>

  <!-- MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 12px;
      border-radius: 12px;
      line-height: 1.4;
      word-wrap: break-word;
      opacity: 0;
      transform: translateY(10px);
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .bot {
      align-self: flex-start;
      background: #1e293b;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: #020617;
      position: sticky;
      bottom: 0;
    }

    input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .msg {
        max-width: 90%;
        font-size: 15px;
      }

      input {
        padding: 16px;
      }

      button {
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Digite sua mensagem..." />
    <button onclick="enviar()">Enviar</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
